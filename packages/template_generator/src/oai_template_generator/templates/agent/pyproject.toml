# pyproject.toml
[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "{{PROJECT_NAME}}"
description = "{{DESCRIPTION}}"
authors = [{name = "{{AUTHOR}}", email = "{{EMAIL}}"}]
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.11"
keywords = ["agent", "agent-server-registry"]
dynamic = ["scripts", "version"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "oai-agent-server",
    "{{AGENT_CORE_PYPROJECT_PLACEHOLDER}}"
]

[tool.uv.sources]
 oai-crewai-core = { git = "https://github.com/Capgemini-Innersource/ptr_oai_agent_development_kit.git", branch = "main", subdirectory = "packages/crewai-core" }
 oai-langgraph-core = { git = "https://github.com/Capgemini-Innersource/ptr_oai_agent_development_kit.git", branch = "main", subdirectory = "packages/langgraph-core" }
 oai-aws-strands-core = { git = "https://github.com/Capgemini-Innersource/ptr_oai_agent_development_kit.git", branch = "main", subdirectory = "packages/aws-strands-core" }
 oai-openai-core = { git = "https://github.com/Capgemini-Innersource/ptr_oai_agent_development_kit.git", branch = "main", subdirectory = "packages/openai-core" }
 oai-agent-server = { git = "https://github.com/Capgemini-Innersource/ptr_oai_agent_development_kit.git", branch = "main", subdirectory = "packages/agent-server" }


[project.urls]
Homepage = "https://github.com/Capgemini-Innersource/{{PROJECT_NAME}}"
Repository = "https://github.com/Capgemini-Innersource/{{PROJECT_NAME}}.git"
Issues = "https://github.com/Capgemini-Innersource/{{PROJECT_NAME}}/issues"


[tool.setuptools.packages.find]
where = ["."]
include = ["agentic_registry_agents*"]
exclude = [".venv", "build", "agent_registry.egg_info", "tests"]

[tool.setuptools.package-data]
"agentic_registry_agents" = ["**/*"]

# Configuration for setuptools_scm (git-based versioning)
[tool.setuptools_scm]
write_to = "agentic_registry_agents/_version.py"
version_scheme = "post-release"
local_scheme = "no-local-version"
