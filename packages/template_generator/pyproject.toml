# pyproject.toml
[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "oai-template-generator"
description = "OAI Agent Server - FastAPI based server for OAI Agents"
authors = [{ name = "Vinod Kumar KP", email = "vinod.kunnum-purath@capgemini.com" }]
license = { text = "MIT" }
readme = "README.md"
requires-python = ">=3.11"
keywords = ["agent", "agent-server", "oai-agent-server", "fastapi"]
dynamic = ["version"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

# Base dependencie
[tool.hatch.version]
source = "vcs"
raw-options = { root = "../.." }
fallback-version = "0.1.0"

[tool.hatch.build.targets.wheel]
packages = ["src/oai_template_generator"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
